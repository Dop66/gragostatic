<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rank Gragofóbicos</title>
        <link rel="icon" type="image/x-icon" href="../../assets/favicon.ico">
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>
    <body class="bg-[#0d0d0d] text-white min-h-screen flex flex-col pt-24">
        
        <div id="bg-outputrank" class="fixed inset-0 -z-10 overflow-hidden">
        </div>

        <header class="w-full py-2 px-4 md:px-8 bg-[#000000]/10 backdrop-blur-md fixed top-0 z-50 flex justify-between items-center">
            <div class="flex items-center m-auto gap-2">
                <h1 class="text-xl font-bold tracking-tighter uppercase italic text-[#508D99]"><a href="../../index.html">GragoStatic</a></h1>
            </div>
        </header>
        
        <div class="flex-grow flex items-center justify-center px-4 md:px-12 []">
            <div class="flex flex-col gap-6 w-full max-w-4xl items-center">
                <div class="text-center text-3xl md:text-4xl text-white mt-8 md:mt-12">
                    <h2>Rank Gragofobicos</h2>
                </div>
                <div class="flex items-center gap-2 mb-6 px-1">
                    <div class="relative flex-1 max-w-xs">
                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
                        </svg>
                        <input
                            type="text"
                            id="searchPlayer"
                            placeholder="Buscar jogador..."
                            class="w-full pl-9 pr-4 py-2 text-sm bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 outline-none focus:border-white/25 focus:bg-white/8 transition-all duration-200"
                        />
                    </div>
                </div>
                <div id="loading"></div>
                <div id="container-cards" class="w-full flex flex-col gap-4"></div>
                </div>
        </div>
        
        <footer class="w-full py-6 mt-12 bg-black/10 backdrop-blur-md flex flex-col items-center justify-center gap-2">
            <p class="text-slate-400 text-xs md:text-sm text-center px-4">
                &copy; 2026 <span class="text-[#33DDFF] font-bold italic">GRAGOSTATIC</span>. Todos os direitos reservados.
            </p>
    
            <a href="https://github.com/Dop66" target="_blank" class="flex items-center gap-2 text-slate-500 hover:text-white transition-all text-xs">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
                </svg>
                https://github.com/Dop66
            </a>
        </footer>
        <script src="js/background_ranks.js"></script>
        <script src="ranks/ranking.js"></script>
        <script>
        const searchInput = document.getElementById('searchPlayer');
        searchInput.addEventListener('input', function(e) {
            const termoBusca = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.player-card');
            cards.forEach(card => {
                // Tenta achar o elemento do nome
                const elementoNome = card.querySelector('.player-name');
                if (elementoNome) {
                    const nome = elementoNome.textContent.toLowerCase();

                    if (nome.includes(termoBusca)) {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                }
            });
        });
        </script>
    </body>
</html>
